name: Squares CI

on:
  push:
    tags:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  node-ci:
    uses: maxmorhardt/workflows/.github/workflows/ci-node.yml@main
    with:
      repository: ${{ github.repository }}
      app_name: ${{ github.event.repository.name }}

  docker-ci:
    uses: maxmorhardt/workflows/.github/workflows/ci-docker.yml@main
    needs: node-ci
    with:
      repository: ${{ github.repository }}
      app_name: ${{ github.event.repository.name }}
      app_version: ${{ github.event_name == 'push' && github.ref_name || 'ci' }}
      artifact_name: dist
      artifact_path: dist
      push: ${{ github.event_name == 'push' }}
    secrets: inherit

  deploy:
    uses: maxmorhardt/workflows/.github/workflows/cd-argocd.yml@main
    needs: docker-ci
    if: ${{ github.event_name == 'push' }}
    with:
      app: ${{ github.event.repository.name }}
      image_tag: ${{ github.ref_name }}
    secrets: inherit
