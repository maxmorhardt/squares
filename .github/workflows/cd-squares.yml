name: Squares CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        type: string
        default: ''
      chart_version:
        description: 'Helm chart version'
        required: false
        type: string
        default: ''

jobs:
  approve:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploy of ${{ github.event.release.tag_name }} approved"

  cd:
    needs: approve
    if: ${{ always() && (needs.approve.result == 'success' || needs.approve.result == 'skipped') }}
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: ${{ github.event.repository.name }}
      namespace: squares
      chart: oci://docker.io/maxmorhardt/${{ github.event.repository.name }}-chart
      chart_version: ${{ inputs.chart_version }}
      image_tag: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.image_tag }}
    secrets: inherit

  smoke:
    needs: cd
    uses: maxmorhardt/workflows/.github/workflows/smoke-node.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: ${{ github.event.repository.name }}
      namespace: squares
      smoke_url: https://squares.maxstash.io
    secrets: inherit
